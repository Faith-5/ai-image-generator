<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra - AI Image Generator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #2b5876);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    .container {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 30px;
        width: 400px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 24px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    input {
        background: rgba(255, 255, 255, 0.1);
        color: rgb(255, 255, 255);
    }
    
    input::placeholder {
        color: rgb(231, 236, 255)
    }
    
    select {
        background: rgba(255,255,255,0.1);
        color: white;
    }

    select:hover {
        color: blue
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #ff7a18;
        background: linear-gradient(45deg, #ff7a18, #ffb347);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .image-box {
        margin-top: 20px;
    }

    img {
        width: 100%;
        border-radius: 15px;
        display: none;
    }

    .loader {
        margin-top: 20px;
        display: none;
    }
</style>

</head>
<body>

<div class="container">
    <h1>✨ Ultra - AI Image Generator</h1>

<input type="text" id="prompt" placeholder="Enter your prompt...">

<select id="model">
    <option value="flux">Flux</option>
</select>

<button onclick="generateImage()">Generate Image</button>

<div class="loader" id="loader">Generating...</div>

<div class="image-box">
    <img id="resultImage" />
    <button onclick="downloadImage()" id="download">Download Image</button>
</div>

</div>

<script>
const downloadBtn = document.getElementById("download"); 
const image = document.getElementById("resultImage");
const loader = document.getElementById("loader");

if(downloadBtn) downloadBtn.style.display = "none";
image.style.display = "none";

async function generateImage() {    
    const prompt = document.getElementById("prompt").value;
    const model = document.getElementById("model").value;
    
    if (!prompt) {
        alert("Please enter a prompt!");
        return;
    }

    loader.style.display = "block";
    image.style.display = "none";
    if(downloadBtn) downloadBtn.style.display = "none";

    try {
        const response = await fetch("http://127.0.0.1:8000/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, model })
        });

        const data = await response.json();

        if (data.image_url) {
            image.dataset.rawPath = data.image_url;
            image.src = data.image_url + "?t=" + new Date().getTime();
            
            image.onload = () => {
                loader.style.display = "none";
                image.style.display = "block";
                if(downloadBtn) {
                    downloadBtn.style.display = "block"; 
                }
            };
        } else {
            alert("Error: " + (data.error || "Unknown error"));
            loader.style.display = "none";
        }
    } catch (error) {
        alert("Error generating image");
        console.error(error);
        loader.style.display = "none";
    }
}

function downloadImage() {
    const rawPath = image.dataset.rawPath;
    if (!rawPath) return;

    const downloadUrl = `http://127.0.0.1:8000/download?file_path=${encodeURIComponent(rawPath)}`;
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = "image.jpg";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
